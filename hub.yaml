schema_version: 1

skills:
- id: code-review
  type: local
  path: code-review
  description: "Expert code review of current git changes with a senior engineer lens.
    Detects SOLID violations, security risks, and proposes actionable improvements."

- id: sigma
  type: local
  path: sigma
  description: "Personalized 1-on-1 AI tutor using Bloom's 2-Sigma mastery learning.
    Guides users through any topic with Socratic questioning, adaptive pacing, and
    rich visual output."

- id: skill-creator
  type: local
  path: skill-creator
  description: "Create new skills, modify and improve existing skills, and measure
    skill performance with quantitative evals and variance analysis."

- id: tdd
  type: local
  path: tdd
  description: "TDD workflow — write failing test first (RED), implement (GREEN),
    refactor. Includes Go/Java/Python examples and testing anti-patterns."

