- id: neat-freak
  type: external
  path: neat-freak
  description: 'End-of-session knowledge cleanup with OCD-level rigor — reconciles
    project docs (CLAUDE.md, README.md, docs/) and agent memory against the code so
    nothing rots. 会话结束后对项目文档和记忆进行洁癖级审查与同步。MUST trigger when the user says: "sync up",
    "tidy up docs", "update memory", "clean up docs", "/sync", "/neat", "同步一下", "整理文档",
    "整理一下", "更新记忆", "梳理一下", "收尾", "这个阶段做完了", "新人能直接上手", or any phrase suggesting a
    dev milestone where knowledge needs reconciliation. Also trigger when the user
    reports stale docs, conflicting memories, or wants a clean handoff to teammates
    or other agents. Bare "整理" / "tidy" with prior dev context counts — do not under-trigger.
    Cross-platform: works on Claude Code, OpenAI Codex, OpenCode, and OpenClaw.'
  source:
    repo: https://github.com/KKKKhazix/khazix-skills.git
    ref: main
    subpath: neat-freak/
  last_synced:
    commit_sha: f78992d0d9ea73f7844e2e27acdd5f5c5e3a13aa
    synced_at: '2026-06-03T08:14:23Z'
  metadata:
    license: MIT
    author: Khazix
- id: bggg-skill-taotie
  type: external
  path: bggg-skill-taotie
  description: Skill 进化器（饕餮）— 通过"吞噬"并分析其他 skill 的优势来强化目标 skill。 当用户想要：整合两个 
    skill、用一个 skill 优化另一个、对比分析两个 skill 的优劣、 把某个 skill 的优点提炼到另一个 skill 中、或者说"把 X 
    喂给 Y"、"用 X 来优化 Y"、 "整合这两个 skill"、"吃掉这个 skill"、"skill 进化"、"skill 升级"、"合并 
    skill" 等意图时，必须触发此 skill。即使用户没有明确说"饕餮"，只要涉及到两个 skill 之间的 
    能力迁移、对比分析、或优势提取，都应该使用此 skill。
  source:
    repo: https://github.com/binggandata/bggg-skills.git
    ref: main
    subpath: bggg-skill-taotie/
  last_synced:
    commit_sha: ec844819e0a434150118b3dcd8baa293a579c147
    synced_at: '2026-06-03T08:16:50Z'
  metadata:
    license: MIT
    author: binggandata
- id: claude-design
  type: external
  path: claude-design
  description: Produce thoughtful, high-fidelity design artifacts in HTML — 
    landing pages, slide decks, interactive prototypes, animated videos, 
    posters, wireframes, and visual explorations. Use whenever the user asks to 
    design, mock up, prototype, visualize, storyboard, or explore UI options — 
    including phrases like "make a deck", "design a landing page", "prototype 
    this flow", "animate this concept", "turn this into a clickable mockup", 
    "show me options for X", "build a pitch deck", "create a poster", "visualize
    this idea", "I don't know what style I want", or "design something for 
    <brand>". Enforces fact verification (WebSearch before assuming a product 
    exists or its version), the Core Asset Protocol for branded work (logo and 
    product shots and UI screenshots are first-class, not just colors and 
    fonts), a Design Direction Advisor fallback that offers 3 differentiated 
    directions from 10 design philosophies when the brief is too vague, commits 
    to a visual system up front, presents multiple variations, and avoids 
    AI-design tropes (aggressive gradients, emoji bullets, 
    rounded-card-with-left-border, CSS-silhouettes-as-product-shots).
  source:
    repo: https://github.com/jiji262/claude-design-skill.git
    ref: main
  last_synced:
    commit_sha: f1ac87c3decb175d99a269f23ca84860786a598b
    synced_at: '2026-06-03T08:20:45Z'
  metadata:
    license: MIT
    author: dennistodo
- id: guizang-ppt-skill
  type: external
  path: guizang-ppt-skill
  description: 生成横向翻页网页 PPT（单 HTML 文件），含 WebGL 背景、章节幕封、数据大字报、图片网格等模板。提供两种风格：① 
    "电子杂志 × 电子墨水"（衬线 + 流体背景 + 暖色） ② "瑞士国际主义"（无衬线 + 网格点阵 + 
    IKB/柠檬黄/柠檬绿/安全橙高亮）。当用户需要制作分享 / 演讲 / 发布会风格的网页 PPT，或提到"杂志风 PPT"、"瑞士风 
    PPT"、"Swiss Style"、"horizontal swipe deck"时使用。
  source:
    repo: https://github.com/op7418/guizang-ppt-skill.git
    ref: main
  last_synced:
    commit_sha: 82fe5ae129e8c2a12e1155fcabed6703342749d6
    synced_at: '2026-06-03T08:27:24Z'
  metadata:
    license: MIT
    author: 郭浩
- id: knowgtzh
  type: external
  path: knowgtzh
  description: 从 WebFetch/WebSearch 结果生成简洁、易读的 GitHub Trending 中文简报，与已有的 
    markdown 历史报告对比，并撰写每日或每周趋势总结。当用户要求分析 GitHub 热门趋势、对比今日与历史趋势、用通俗语言解释热门仓库，或为 
    Codex、Claude Code 等编码助手创建可重复的 GitHub 趋势报告时使用。
  source:
    repo: https://github.com/wahahaazhe/knowgt.git
    ref: master
