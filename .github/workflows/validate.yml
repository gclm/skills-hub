name: Validate Skills

on:
  pull_request:
    paths:
      - "**/SKILL.md"
      - "hub.yaml"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - "hub.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate hub.yaml schema
        run: python scripts/validate.py --hub-file hub.yaml

      - name: Validate SKILL.md frontmatter
        run: python scripts/validate.py --check-skill-md
