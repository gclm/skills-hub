name: Add Skill from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  add-skill:
    # Only process issues that contain "仓库地址" field (from the add-skill template)
    if: contains(github.event.issue.body, '仓库地址')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Save issue body
        run: echo "${{ github.event.issue.body }}" > /tmp/issue_body.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Parse and create skill
        id: parse
        run: |
          python scripts/add_skill_from_issue.py \
            --issue-body /tmp/issue_body.txt \
            --issue-number ${{ github.event.issue.number }} \
            --output /tmp/add_result.json

      - name: Read result
        id: result
        run: |
          python -c "
          import json
          d = json.load(open('/tmp/add_result.json'))
          print(f'success={d[\"success\"]}')
          print(f'skill_id={d.get(\"skill_id\", \"\")}')
          "

      - name: Create Pull Request
        if: steps.result.outputs.success == 'True'
        uses: peter-evans/create-pull-request@v7
        id: create-pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: add-skill/issue-${{ github.event.issue.number }}
          delete-branch: true
          title: "feat: add ${{ steps.result.outputs.skill_id }} from #${{ github.event.issue.number }}"
          commit-message: "feat: add ${{ steps.result.outputs.skill_id }} from issue #${{ github.event.issue.number }}"
          labels: add-skill,automated
          body: |
            ## New Skill from Issue #${{ github.event.issue.number }}

            Closes #${{ github.event.issue.number }}

            ---
            Auto-merge is enabled. Will merge after CI validation passes.

      - name: Comment success on issue
        if: steps.result.outputs.success == 'True'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "✅ Skill 已处理，PR 已创建。CI 校验通过后将自动合并。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.result.outputs.success == 'True'
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle parse error
        if: failure()
        run: |
          # Read error details
          ERRORS=$(python -c "import json; d=json.load(open('/tmp/add_result.json')); print('\\n'.join(d.get('errors',['Unknown error'])))" 2>/dev/null || echo "Unknown error")
          gh issue comment ${{ github.event.issue.number }} \
            --body "❌ 处理失败：

          \`\`\`
          $ERRORS
          \`\`\`

          常见问题：
          - 仓库地址必须是可访问的 Git 仓库
          - 仓库中必须包含 \`SKILL.md\` 文件
          - 如指定子目录，确保路径正确"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
