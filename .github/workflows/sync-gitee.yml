name: Sync to Gitee

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        run: |
          git remote add gitee "https://gclm:${{ secrets.GITEE_TOKEN }}@gitee.com/gclm/skills-hub.git"
          git push gitee --all --force
          git push gitee --tags --force
