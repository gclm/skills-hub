name: Add New Skill
description: 从外部仓库添加一个 skill（脚本会自动获取名称、描述、许可证等信息）
labels:
  - add-skill
body:
  - type: input
    id: repo-url
    attributes:
      label: 仓库地址
      description: GitHub 仓库 URL（如 https://github.com/org/repo）
      placeholder: https://github.com/org/repo
    validations:
      required: true

  - type: input
    id: subpath
    attributes:
      label: 子目录路径（可选）
      description: 如果 skill 在仓库的某个子目录中，填写相对路径
      placeholder: skills/my-skill/

  - type: input
    id: ref
    attributes:
      label: 分支 / 标签（可选）
      description: 默认使用 main 分支
      placeholder: main
